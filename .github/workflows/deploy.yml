name: Deploy DevFind

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Tinder_web
            git reset --hard
            git pull
            npm install
            npm run build
            sudo rm -rf /var/www/devfind/*
            sudo cp -r dist/* /var/www/devfind
            sudo systemctl restart nginx
            